<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a14" />
  <title>Last Signal</title>
  <style>
    :root {
      --bg: #0a0a14;
      --panel: #0f0f1e;
      --accent: #00ffa3;
      --accent2: #7b5cff;
      --warn: #ff4e6a;
      --text: #d0d8e8;
      --muted: #5a6480;
      --border: rgba(0,255,163,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html {
      width: 100%; height: 100%;
      height: 100dvh;
      overflow: hidden; background: var(--bg);
    }
    body {
      width: 100%; height: 100%;
      min-height: -webkit-fill-available;
      overflow: hidden; background: var(--bg);
    }

    #app {
      width: 100%;
      height: 100%;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── TITLE ────────────────────────────────────────── */
    #screen-title {
      background: radial-gradient(ellipse at 50% 30%, #0d1a2e 0%, #0a0a14 70%);
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow-y: auto;
      padding: 40px 20px env(safe-area-inset-bottom, 24px);
      -webkit-overflow-scrolling: touch;
    }
    .title-glitch {
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent), 0 0 60px rgba(0,255,163,0.3);
      position: relative;
      animation: glitch 3s infinite;
    }
    @keyframes glitch {
      0%,90%,100% { transform: none; text-shadow: 0 0 20px var(--accent), 0 0 60px rgba(0,255,163,0.3); }
      92% { transform: translate(-2px,0) skewX(-3deg); text-shadow: 2px 0 #ff4e6a, -2px 0 var(--accent2); }
      94% { transform: translate(2px,0) skewX(2deg); text-shadow: -2px 0 #ff4e6a, 2px 0 var(--accent2); }
      96% { transform: none; }
    }
    .title-sub {
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
    }
    .title-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 20px auto;
      flex-shrink: 0;
    }
    .title-story {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.7;
      text-align: center;
      padding: 0 40px;
      max-width: 340px;
    }
    .title-story em { color: var(--text); font-style: normal; }
    .btn-primary {
      margin-top: 24px;
      flex-shrink: 0;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      padding: 14px 48px;
      border-radius: 2px;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-primary:active::before { opacity: 0.12; }
    .signal-dots {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      flex-shrink: 0;
    }
    .signal-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 1.5s infinite;
    }
    .signal-dot:nth-child(2) { animation-delay: 0.3s; }
    .signal-dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse-dot {
      0%,100% { opacity: 0.2; } 50% { opacity: 1; }
    }

    /* ── HUD ──────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(10,10,20,0.85);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    #hud.visible { opacity: 1; pointer-events: all; }
    .hud-signal {
      display: flex;
      align-items: flex-end;
      gap: 3px;
    }
    .hud-bar {
      width: 4px;
      background: var(--accent);
      border-radius: 1px;
      transition: height 0.4s, opacity 0.4s;
    }
    .hud-label {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-left: 8px;
    }
    .hud-battery {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--text);
    }
    .hud-battery-bar {
      width: 32px;
      height: 10px;
      border: 1px solid var(--muted);
      border-radius: 2px;
      padding: 2px;
      position: relative;
    }
    .hud-battery-bar::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 5px;
      background: var(--muted);
      border-radius: 0 1px 1px 0;
    }
    .hud-battery-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      transition: width 0.5s;
    }
    .hud-level {
      font-size: 0.65rem;
      color: var(--accent2);
      letter-spacing: 0.1em;
    }

    /* ── SCENE ────────────────────────────────────────── */
    #screen-scene {
      flex-direction: column;
    }
    .scene-bg {
      position: absolute;
      inset: 0;
      transition: background 0.6s ease;
    }
    .scene-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 30%, rgba(10,10,20,0.7) 70%, rgba(10,10,20,0.95) 100%);
    }
    .scene-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: 56px;
    }
    .scene-art {
      flex: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 16px;
    }
    .char-portrait {
      width: 120px;
      height: 180px;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .char-svg { width: 100%; height: 100%; }
    .scene-dialogue {
      background: rgba(10,10,20,0.92);
      border-top: 1px solid var(--border);
      padding: 20px 20px 16px;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .dialogue-speaker {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .dialogue-text {
      font-size: 0.92rem;
      line-height: 1.65;
      color: var(--text);
      flex: 1;
    }
    .dialogue-choices {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .choice-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.85rem;
      line-height: 1.4;
      padding: 12px 16px;
      border-radius: 4px;
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .choice-btn::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--accent2);
      transform: scaleY(0);
      transition: transform 0.15s;
    }
    .choice-btn:active { background: rgba(123,92,255,0.12); border-color: var(--accent2); }
    .choice-btn:active::before { transform: scaleY(1); }
    .tap-continue {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-align: right;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }

    /* ── MAP ──────────────────────────────────────────── */
    #screen-map {
      background: var(--bg);
    }
    .map-content {
      padding-top: 56px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .map-header {
      padding: 16px 20px 8px;
    }
    .map-title {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .map-area-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin-top: 2px;
    }
    .map-grid {
      flex: 1;
      position: relative;
      padding: 16px;
      overflow: hidden;
    }
    .city-map-svg {
      width: 100%;
      height: 100%;
    }
    .map-locations {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 0 16px 16px;
    }
    .location-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 14px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .location-card.locked { opacity: 0.4; pointer-events: none; }
    .location-card.visited { border-color: rgba(0,255,163,0.08); }
    .location-card.visited::after {
      content: '✓';
      position: absolute;
      top: 8px; right: 10px;
      font-size: 0.7rem;
      color: var(--accent);
      opacity: 0.6;
    }
    .location-card:active { background: rgba(123,92,255,0.1); transform: scale(0.98); }
    .location-icon {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .location-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }
    .location-desc {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.4;
    }
    .location-signal {
      font-size: 0.62rem;
      color: var(--accent);
      margin-top: 6px;
    }
    .map-device-bar {
      padding: 12px 20px;
      background: rgba(15,15,30,0.9);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .device-status {
      font-size: 0.72rem;
      color: var(--accent);
    }
    .btn-device {
      background: var(--accent2);
      color: #fff;
      border: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* ── PUZZLE ───────────────────────────────────────── */
    #screen-puzzle {
      background: var(--bg);
    }
    .puzzle-content {
      padding-top: 56px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 56px 20px 20px;
      gap: 16px;
    }
    .puzzle-header { }
    .puzzle-title {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .puzzle-desc {
      font-size: 0.9rem;
      color: var(--text);
      margin-top: 6px;
      line-height: 1.5;
    }
    .puzzle-signal-display {
      background: rgba(0,255,163,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-align: center;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
    }
    .signal-waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 30px;
    }
    .wave-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--accent);
      opacity: 0.7;
      animation: wave 1s infinite;
    }
    @keyframes wave {
      0%,100% { transform: scaleY(0.3); } 50% { transform: scaleY(1); }
    }
    .puzzle-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      flex: 1;
      align-content: start;
    }
    .puzzle-tile {
      aspect-ratio: 1;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Courier New', monospace;
    }
    .puzzle-tile.selected {
      background: rgba(0,255,163,0.15);
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.05);
    }
    .puzzle-tile.correct { background: rgba(0,255,163,0.25); border-color: var(--accent); }
    .puzzle-tile.wrong { background: rgba(255,78,106,0.2); border-color: var(--warn); }
    .puzzle-hint {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── DEVICE UPGRADE ────────────────────────────────── */
    #screen-device {
      background: var(--bg);
    }
    .device-content {
      padding-top: 56px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 56px 20px 20px;
      gap: 16px;
    }
    .device-visual {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .device-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      box-shadow: 0 0 30px rgba(0,255,163,0.2);
      animation: rotate-ring 8s linear infinite;
    }
    @keyframes rotate-ring {
      from { box-shadow: 0 0 30px rgba(0,255,163,0.2), inset 0 0 20px rgba(0,255,163,0.05); }
      50% { box-shadow: 0 0 50px rgba(0,255,163,0.4), inset 0 0 30px rgba(0,255,163,0.1); }
      to { box-shadow: 0 0 30px rgba(0,255,163,0.2), inset 0 0 20px rgba(0,255,163,0.05); }
    }
    .device-icon { font-size: 3rem; }
    .device-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(0,255,163,0.2);
      animation: rotate-ring2 4s linear infinite;
    }
    @keyframes rotate-ring2 {
      from { transform: rotate(0deg); border-top-color: var(--accent); }
      to { transform: rotate(360deg); border-top-color: var(--accent); }
    }
    .device-info { text-align: center; }
    .device-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .device-lv { font-size: 0.7rem; color: var(--accent); letter-spacing: 0.15em; margin-top: 2px; }
    .upgrade-list { display: flex; flex-direction: column; gap: 10px; }
    .upgrade-item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .upgrade-item.owned { border-color: rgba(0,255,163,0.3); opacity: 0.7; pointer-events: none; }
    .upgrade-item.locked { opacity: 0.4; pointer-events: none; }
    .upgrade-item:active { background: rgba(123,92,255,0.1); }
    .upgrade-icon { font-size: 1.5rem; }
    .upgrade-info { flex: 1; }
    .upgrade-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .upgrade-desc { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .upgrade-cost {
      font-size: 0.72rem;
      color: var(--accent);
      white-space: nowrap;
    }
    .upgrade-cost.owned { color: var(--muted); }
    .btn-back {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.1em;
    }

    /* ── ENDING ───────────────────────────────────────── */
    #screen-ending {
      align-items: center;
      justify-content: center;
    }
    .ending-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 32px;
      text-align: center;
      gap: 20px;
    }
    .ending-icon { font-size: 4rem; }
    .ending-tag {
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }
    .ending-title {
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1.2;
    }
    .ending-text {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .ending-stats {
      display: flex;
      gap: 24px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-val { font-size: 1.4rem; font-weight: 700; }
    .stat-lbl { font-size: 0.6rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; }
    .ending-rebuilder { background: radial-gradient(ellipse at 50% 20%, #0a2e1a 0%, var(--bg) 70%); }
    .ending-rebuilder .ending-tag { color: var(--accent); }
    .ending-rebuilder .ending-title { color: var(--accent); }
    .ending-opportunist { background: radial-gradient(ellipse at 50% 20%, #1a1a0a 0%, var(--bg) 70%); }
    .ending-opportunist .ending-tag { color: #ffd700; }
    .ending-opportunist .ending-title { color: #ffd700; }
    .ending-truth { background: radial-gradient(ellipse at 50% 20%, #1a0a2e 0%, var(--bg) 70%); }
    .ending-truth .ending-tag { color: var(--accent2); }
    .ending-truth .ending-title { color: var(--accent2); }

    /* ── NOTIFICATION ─────────────────────────────────── */
    #notification {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(0,255,163,0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      padding: 8px 20px;
      border-radius: 20px;
      z-index: 1000;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      max-width: 90%;
    }
    #notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── TRANSITION OVERLAY ───────────────────────────── */
    #fade-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #fade-overlay.active { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Title Screen -->
    <div id="screen-title" class="screen active">
      <div class="title-glitch">LAST SIGNAL</div>
      <div class="title-sub">A story about the end of connection</div>
      <div class="title-divider"></div>
      <p class="title-story">
        All communication has stopped.<br/>
        Phones. Internet. AI. <em>Silent overnight.</em><br/>
        But you found a device that still works.
      </p>
      <button class="btn-primary" id="btn-start">TRANSMIT</button>
      <div class="signal-dots">
        <div class="signal-dot"></div>
        <div class="signal-dot"></div>
        <div class="signal-dot"></div>
      </div>
    </div>

    <!-- Scene Screen -->
    <div id="screen-scene" class="screen">
      <div class="scene-bg" id="scene-bg"></div>
      <div class="scene-overlay"></div>
      <div class="scene-content">
        <div class="scene-art" id="scene-art"></div>
        <div class="scene-dialogue">
          <div class="dialogue-speaker" id="dialogue-speaker"></div>
          <div class="dialogue-text" id="dialogue-text"></div>
          <div class="dialogue-choices" id="dialogue-choices"></div>
          <div class="tap-continue" id="tap-continue">TAP TO CONTINUE ▸</div>
        </div>
      </div>
    </div>

    <!-- Map Screen -->
    <div id="screen-map" class="screen">
      <div class="map-content">
        <div class="map-header">
          <div class="map-title">Explore</div>
          <div class="map-area-name" id="map-area-name">Nova City</div>
        </div>
        <div class="map-locations" id="map-locations"></div>
        <div class="map-device-bar">
          <div class="device-status" id="device-status">📡 Signal: searching...</div>
          <button class="btn-device" id="btn-open-device">DEVICE ↑</button>
        </div>
      </div>
    </div>

    <!-- Puzzle Screen -->
    <div id="screen-puzzle" class="screen">
      <div class="puzzle-content">
        <div class="puzzle-header">
          <div class="puzzle-title">Signal Decryption</div>
          <div class="puzzle-desc" id="puzzle-desc"></div>
        </div>
        <div class="puzzle-signal-display" id="puzzle-display"></div>
        <div class="puzzle-grid" id="puzzle-grid"></div>
        <div class="puzzle-hint" id="puzzle-hint"></div>
      </div>
    </div>

    <!-- Device Screen -->
    <div id="screen-device" class="screen">
      <div class="device-content">
        <div class="device-visual">
          <div class="device-circle">
            <div class="device-ring"></div>
            <div class="device-icon">📡</div>
          </div>
        </div>
        <div class="device-info">
          <div class="device-name">Signal Harvester</div>
          <div class="device-lv" id="device-lv-label">LV.1 — BASIC</div>
        </div>
        <div class="upgrade-list" id="upgrade-list"></div>
        <button class="btn-back" id="btn-device-back">← BACK TO MAP</button>
      </div>
    </div>

    <!-- Ending Screen -->
    <div id="screen-ending" class="screen">
      <div class="ending-content" id="ending-content"></div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div style="display:flex;align-items:center;gap:2px">
        <div class="hud-signal" id="hud-signal">
          <div class="hud-bar" style="height:6px"></div>
          <div class="hud-bar" style="height:10px"></div>
          <div class="hud-bar" style="height:14px"></div>
          <div class="hud-bar" style="height:18px;opacity:0.2"></div>
          <div class="hud-bar" style="height:22px;opacity:0.2"></div>
        </div>
        <span class="hud-label" id="hud-signal-txt">SIGNAL</span>
      </div>
      <span class="hud-level" id="hud-level">LV.1</span>
      <div class="hud-battery">
        <div class="hud-battery-bar">
          <div class="hud-battery-fill" id="hud-battery-fill" style="width:100%"></div>
        </div>
        <span id="hud-battery-txt">100%</span>
      </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification"></div>

    <!-- Fade Overlay -->
    <div id="fade-overlay"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
